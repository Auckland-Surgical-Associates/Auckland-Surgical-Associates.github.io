{{/* page-hero.html - Reusable hero section for non-homepage pages */}}
<section class="page-hero{{ with .Params.hero_color }} page-hero--{{ . }}{{ end }}">
  <div class="container">
    <div>
    {{- with .Params.hero_icon }}
      <svg class="hero__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        {{- if eq . "obesity" "bariatric" }}
        {{/* Slim waist icon — Obesity treatment */}}
        <path d="M4.6 11.7L1 11.7M4.5 11.7L3.1 10.3M3.1 13.3L4.5 11.8"/>
        <path d="M4.6 6C4.6 6 8.2 10.8 5.1 17.5"/>
        <path d="M19.4 6C19.4 6 15.5 11.1 19.4 18"/>
        <path d="M19.4 11.7L23 11.7M19.5 11.7L20.9 10.3M20.9 13.3L19.5 11.8"/>
        <path d="M12.2 13.8v.5"/>
        {{- else if eq . "antireflux" }}
        {{/* Stomach outline icon — Upper GI Surgery */}}
        <path d="M9 2.4L6.3 2.4C6.3 2.4 4.4 8.4 9.7 9.5 9.3 11.6 6.3 12.9 6.3 15C4 15.1 1 14.5 1.2 21.2 3.4 21.4 3.7 21.2 3.7 21.2 3.7 21.2 2.8 17.3 5.6 17.6 6.5 18.6 8.5 22.7 15.8 17.6 23 12.6 20.9 8.4 19.8 6.8 18.8 5.3 15.1 1.3 10.6 6.8 7.7 5.9 9 2.4 9 2.4Z"/>
        {{- else if eq . "cancer" }}
        {{/* Ribbon/awareness icon — Cancer Surgery */}}
        <path d="M12 2c-1.5 2-4 5-4 8a4 4 0 0 0 4 4 4 4 0 0 0 4-4c0-3-2.5-6-4-8z"/>
        <path d="M12 14v8"/>
        <path d="M9 18h6"/>
        {{- else if eq . "hernia" }}
        {{/* Medical/mesh icon — Hernia and Gallbladder surgery */}}
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>
        {{- else if eq . "robotic" }}
        {{/* Robotic arm icon — Robotic surgery */}}
        <path d="M12 2a2 2 0 0 1 2 2v2h-4V4a2 2 0 0 1 2-2z"/>
        <path d="M8 6h8v4H8z"/>
        <path d="M6 10l-3 8h3l2-4"/>
        <path d="M18 10l3 8h-3l-2-4"/>
        <path d="M10 14h4v4a2 2 0 0 1-4 0v-4z"/>
        {{- else if eq . "injection" }}
        {{/* Syringe/injection icon — Medical weight loss */}}
        <path d="m18 2 4 4"></path><path d="m17 7 3-3"></path><path d="M19 9 8.7 19.3c-1 1-2.5 1-3.4 0l-.6-.6c-1-1-1-2.5 0-3.4L15 5"></path>
        <path d="m9 11 4 4"></path><path d="m5 19-3 3"></path><path d="m14 4 6 6"></path>
        {{- else if eq . "surgical" }}
        {{/* Scalpel icon — Surgical weight loss */}}
          <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707"/>
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 8v4l2 2"/>
        {{- else if eq . "endoscopy" }}
        {{/* Scope/camera icon — Endoscopy */}}
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2a10 10 0 0 1 10 10"/>
        <path d="M12 2a10 10 0 0 0-10 10"/>
        <path d="M12 22a10 10 0 0 1-10-10"/>
        <path d="M12 22a10 10 0 0 0 10-10"/>
        <circle cx="12" cy="12" r="7" fill="none"/>
        {{- end }}
      </svg>
    {{- end }}
    </div>

    <div>
    <h1 class="page-hero__title">{{ .Params.hero_title | default .Title }}</h1>
    {{- with .Params.hero_subtitle }}
    <p class="page-hero__subtitle">{{ . }}</p>
    {{- end }}
    </div>
  </div>
</section>
